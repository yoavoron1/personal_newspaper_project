<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — The Personal Times</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/newspaper.css" />
  </head>

  <body>
    <nav class="topnav">
      <a href="/" class="brand">
        <span class="brand-mark">T</span>
        <span class="brand-name">The Personal Times</span>
      </a>
      <div class="topnav-actions">
        <a href="/register" class="topnav-link">Create account</a>
      </div>
    </nav>

    <main class="page">
      <div class="form-card">
        <div class="form-header">
          <span class="eyebrow">Members</span>
          <h1>Welcome back.</h1>
          <p class="form-sub">Sign in to read this week's edition.</p>
        </div>

        {% if error %}
        <div class="alert" role="alert">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:2px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="post" action="/login" novalidate>
          <div class="field">
            <label class="field-label" for="email">Email</label>
            <input
              class="field-input"
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              required
              autocomplete="email"
              autofocus
            />
          </div>

          <div class="field" style="margin-bottom:1.75rem;">
            <label class="field-label" for="password">Password</label>
            <input
              class="field-input"
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            />
          </div>

          <button type="submit" class="btn btn-primary btn-block">
            Sign In
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </button>

          <p class="form-meta">
            New here?<a href="/register">Create an account</a>
          </p>
        </form>
      </div>
    </main>

    <footer class="site-footer">
      The Personal Times · A Private Press
    </footer>
  </body>
</html>
